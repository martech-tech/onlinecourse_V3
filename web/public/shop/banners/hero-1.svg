<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BAE6FD"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#FB923C"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1500" height="500" rx="40" fill="url(#bg)"/>

  <circle cx="1250" cy="110" r="120" fill="#7DD3FC" opacity="0.35"/>
  <circle cx="1350" cy="170" r="70" fill="#FDE68A" opacity="0.35"/>
  <circle cx="120" cy="410" r="110" fill="#FDBA74" opacity="0.30"/>

  <g filter="url(#shadow)">
    <rect x="900" y="120" width="480" height="260" rx="28" fill="#FFFFFF" opacity="0.92"/>
    <rect x="940" y="165" width="210" height="20" rx="10" fill="#E2E8F0"/>
    <rect x="940" y="200" width="260" height="20" rx="10" fill="#E2E8F0"/>
    <rect x="940" y="235" width="180" height="20" rx="10" fill="#E2E8F0"/>
    <rect x="940" y="285" width="190" height="54" rx="18" fill="url(#accent)"/>
  </g>

  <g>
    <text x="110" y="190" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" font-size="54" font-weight="800" fill="#0F172A">Super Brand Day</text>
    <text x="110" y="245" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" font-size="28" font-weight="600" fill="#334155">Up to 23% off · Limited time</text>
    <text x="110" y="320" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" font-size="18" font-weight="600" fill="#F97316">Shop deals now →</text>
  </g>
</svg>
